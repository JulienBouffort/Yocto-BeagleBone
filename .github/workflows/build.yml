name: Yocto BeagleBone Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Yocto dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo \
            gcc build-essential chrpath socat cpio \
            python3 python3-pip python3-pexpect \
            python3-git python3-jinja2 python3-subunit \
            xz-utils zstd liblz4-tool lz4 bzip2 gzip tar \
            debianutils iputils-ping file locales \
            libacl1 libegl1-mesa libsdl1.2-dev mesa-common-dev \
            curl rsync bc libssl-dev libelf-dev pkg-config
          sudo locale-gen en_US.UTF-8

      - name: Cache sstate
        uses: actions/cache@v4
        with:
          path: sstate-cache
          key: yocto-sstate-beaglebone-${{ hashFiles('sources/meta-wfb-ng/**/*.bb', 'build/conf/local.conf') }}
          restore-keys: |
            yocto-sstate-beaglebone-
          save-always: true   # ← sauvegarder même si le build échoue

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: downloads
          key: yocto-downloads-${{ hashFiles('sources/meta-wfb-ng/**/*.bb') }}
          restore-keys: |
            yocto-downloads-
          save-always: true   # ← idem*
          

      - name: Clone Poky
        run: git clone -b scarthgap git://git.yoctoproject.org/poky.git sources/poky

      - name: Clone meta-arm
        run: git clone -b scarthgap git://git.yoctoproject.org/meta-arm.git sources/meta-arm

      - name: Clone meta-ti
        run: git clone -b scarthgap https://git.yoctoproject.org/meta-ti.git sources/meta-ti

      - name: Clone meta-openembedded
        run: git clone -b scarthgap https://github.com/openembedded/meta-openembedded.git sources/meta-openembedded

      - name: Setup build environment
        run: |
          WORKSPACE="${GITHUB_WORKSPACE}"
          
          # Initialiser l'environnement ET créer les fichiers dans le même shell
          source sources/poky/oe-init-build-env ${WORKSPACE}/build
          
          cat > ${WORKSPACE}/build/conf/local.conf << EOF
          MACHINE = "beaglebone-yocto"
          DL_DIR = "${WORKSPACE}/downloads"
          SSTATE_DIR = "${WORKSPACE}/sstate-cache"
          BB_NUMBER_THREADS = "4"
          PARALLEL_MAKE = "-j4"
          IMAGE_FSTYPES = "ext4 wic wic.bmap"
          IMAGE_INSTALL:append = " wfb-ng rtl8812eu iw iwd python3 python3-pip cmake git wget gcc make"
          DISTRO = "poky"
          PACKAGE_CLASSES = "package_rpm"
          LICENSE_FLAGS_ACCEPTED = "commercial"
          INHERIT += "rm_work"
          RM_WORK_EXCLUDE += "wfb-ng rtl8812eu"
          SSTATE_MIRRORS = "file://.* http://sstate.yoctoproject.org/all/PATH;downloadfilename=PATH"
          EOF

                    cat > ${WORKSPACE}/build/conf/bblayers.conf << EOF
          POKY_BBLAYERS_CONF_VERSION = "2"
          BBPATH = "\${TOPDIR}"
          BBFILES ?= ""
          BBLAYERS ?= " \
            ${WORKSPACE}/sources/poky/meta \
            ${WORKSPACE}/sources/poky/meta-poky \
            ${WORKSPACE}/sources/poky/meta-yocto-bsp \
            ${WORKSPACE}/sources/meta-arm/meta-arm \
            ${WORKSPACE}/sources/meta-arm/meta-arm-toolchain \
            ${WORKSPACE}/sources/meta-openembedded/meta-oe \
            ${WORKSPACE}/sources/meta-openembedded/meta-python \
            ${WORKSPACE}/sources/meta-openembedded/meta-networking \
            ${WORKSPACE}/sources/meta-ti/meta-ti-bsp \
            ${WORKSPACE}/sources/meta-wfb-ng \
            "
          EOF

      - name: Build core-image-minimal
        run: |
          source sources/poky/oe-init-build-env ${GITHUB_WORKSPACE}/build
          bitbake core-image-minimal
        env:
          LANG: en_US.UTF-8

      - name: Upload image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: beaglebone-image
          path: |
            build/tmp/deploy/images/beaglebone-yocto/*.wic
            build/tmp/deploy/images/beaglebone-yocto/*.wic.bmap
            build/tmp/deploy/images/beaglebone-yocto/*.ext4
          retention-days: 7